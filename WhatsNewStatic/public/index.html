<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogs</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 20px 10px;
        }

            /* When no photo: vertically center title + text */
            #slide-container.no-photo {
                justify-content: center;
                gap: 24px;
            }

            #slide-container h2 {
                font-size: 2.2em;
                text-align: center;
                flex-shrink: 0;
                margin-bottom: 8px;
            }

            #slide-container .img-wrapper {
                flex: 1;
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 0;
            }

            #slide-container img {
                max-width: 100%;
                max-height: 100%;
                border-radius: 10px;
                object-fit: contain;
            }

            #slide-container p {
                font-size: 1.6em;
                text-align: center;
                flex-shrink: 0;
                margin-top: 8px;
            }

        /* Tap-to-start overlay */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

            #start-overlay h1 {
                font-size: 3em;
                margin-bottom: 30px;
            }

            #start-overlay button {
                font-size: 1.5em;
                padding: 20px 50px;
                border: none;
                border-radius: 10px;
                background: #444;
                color: #fff;
                cursor: pointer;
                transition: background 0.2s;
            }

                #start-overlay button:hover {
                    background: #666;
                }
    </style>
</head>
<body>
    <div id="start-overlay">
        <h1>🐾 Dogs</h1>
        <button id="start-btn">▶ Start Slideshow</button>
    </div>

    <div id="slide-container"></div>
    <script src="client.js"></script>
</body>
</html>
