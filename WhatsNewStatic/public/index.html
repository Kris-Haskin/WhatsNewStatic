<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        .slide {
            display: none;
            margin: 0 auto;
            padding: 15px;
            max-width: 800px;
            background-color: #222;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

            .slide.active {
                display: block;
            }

        h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        .slide img {
            display: block;
            max-width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Dogs</h1>
    <div id="slide-container"></div>
    <script src="client.js"></script>
</body>
</html>
